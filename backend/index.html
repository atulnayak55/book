<!DOCTYPE html>
<html>
    <head>
        <title>Bobooks Chat Test</title>
    </head>
    <body>
        <h1>Bobooks Chat - Unipd</h1>
        <div id="status">Connecting...</div>
        
        <label>My User ID: </label><input type="number" id="userId" value="1">
        <button onclick="connect()">Connect</button>
        <hr>
        
        <label>Send to User ID: </label><input type="number" id="receiverId" value="2"><br>
        <label>Room ID: </label><input type="number" id="roomId" value="1"><br>
        <input type="text" id="messageText" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
        
        <ul id='messages'></ul>

        <script>
            var ws;
            function connect() {
                var userId = document.getElementById("userId").value;
                ws = new WebSocket(`ws://localhost:8000/chat/ws/${userId}`);
                
                ws.onopen = function() {
                    document.getElementById("status").innerText = "Connected as User " + userId;
                };

                ws.onmessage = function(event) {
                    var messages = document.getElementById('messages');
                    var message = JSON.parse(event.data);
                    var content = document.createElement('li');
                    content.innerText = "From User " + message.sender_id + ": " + message.content;
                    messages.appendChild(content);
                };
            }

            function sendMessage() {
                var input = document.getElementById("messageText");
                var receiverId = document.getElementById("receiverId").value;
                var roomId = document.getElementById("roomId").value;
                var userId = document.getElementById("userId").value; // Get our own ID
                
                var data = {
                    "room_id": parseInt(roomId),
                    "receiver_id": parseInt(receiverId),
                    "sender_id": parseInt(userId), // Add this so the receiver knows who sent it
                    "content": input.value
                };
                
                // CRITICAL: Must be uppercase JSON.stringify
                ws.send(JSON.stringify(data));
                
                // Show my own message on my screen
                var messages = document.getElementById('messages');
                var content = document.createElement('li');
                content.style.color = "blue";
                content.innerText = "Me: " + input.value;
                messages.appendChild(content);
                
                console.log("Sent:", data);
                input.value = '';
            }
        </script>
    </body>
</html>
