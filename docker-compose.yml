services:
  db:
    image: postgres:16-alpine
    container_name: bobooks_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: bobooks
    ports:
      - "5432:5432"
    volumes:
      # This ensures your data persists even if you stop the container
      - pgdata:/var/lib/postgresql/data
      # OPTIONAL: Put .sql files in an ./init-db folder to run them on startup
      # - ./init-db:/docker-entrypoint-initdb.d

volumes:
  pgdata:
